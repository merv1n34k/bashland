map $http_upgrade $bl_connection_upgrade {
    default upgrade;
    ''      close;
}

log_format bashland '$time_iso8601 "$request" $status $bytes_sent '
                    'ua="$http_user_agent" upg="$http_upgrade"';

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://__DOMAIN__$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__DOMAIN__;
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    return 301 https://__DOMAIN__$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 16k;

    access_log /var/log/nginx/bashland.access.log bashland;
    error_log  /var/log/nginx/bashland.error.log warn;

    # Class password gate covers all locations under this server.
    auth_basic           "BashLand";
    auth_basic_user_file /etc/nginx/bashland.htpasswd;

    # /hard must precede / so it wins routing.
    location /hard {
        proxy_pass http://127.0.0.1:7682;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $bl_connection_upgrade;
        proxy_set_header Host              $host;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;

        sub_filter '<title>ttyd - Terminal</title>' '<title>BashLand</title>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }

    location / {
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $bl_connection_upgrade;
        proxy_set_header Host              $host;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;

        sub_filter '<title>ttyd - Terminal</title>' '<title>BashLand</title>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }
}
